name: Deploy to GitHub Pages

# Build + publish on every push to main, or manually via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deployments need these scopes.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; queued runs supersede each other.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        # BASE_PATH must match the repo name as it appears in the Pages URL.
        # If you fork or rename the repo, change this to "/<new-repo-name>/".
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
